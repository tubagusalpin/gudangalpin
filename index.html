<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Form Pengambilan Barang Gudang</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:40px;
}

.container{
background:white;
padding:30px;
max-width:700px;
margin:auto;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#2563eb;
color:white;
padding:12px;
border:none;
border-radius:8px;
width:100%;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Form Pengambilan Barang Gudang</h2>

<form id="formGudang">

<label>Nama Petugas</label>
<input type="text" id="petugas" required>

<label>Nama Barang</label>
<input type="text" id="barang" required>

<label>Jenis Barang</label>
<input type="text" id="jenis" required>

<label>Keterangan</label>
<textarea id="keterangan"></textarea>

<label>Foto Barang</label>
<input type="file" id="fotoBarang" accept="image/*">

<label>Foto Before</label>
<input type="file" id="before" accept="image/*">

<label>Foto After</label>
<input type="file" id="after" accept="image/*">

<button type="submit">Kirim Laporan</button>

</form>

</div>

<script>

const scriptURL = "PASTE_URL_APPS_SCRIPT_DISINI";

function toBase64(file){
return new Promise((resolve,reject)=>{
const reader = new FileReader();
reader.readAsDataURL(file);
reader.onload = ()=>resolve(reader.result);
reader.onerror = error => reject(error);
});
}

document.getElementById("formGudang").addEventListener("submit", async function(e){

e.preventDefault();

let fotoBarang = document.getElementById("fotoBarang").files[0];
let before = document.getElementById("before").files[0];
let after = document.getElementById("after").files[0];

let data = {

petugas: document.getElementById("petugas").value,
barang: document.getElementById("barang").value,
jenis: document.getElementById("jenis").value,
keterangan: document.getElementById("keterangan").value,

fotoBarang: fotoBarang ? await toBase64(fotoBarang) : "",
before: before ? await toBase64(before) : "",
after: after ? await toBase64(after) : ""

};

fetch(scriptURL,{
method:"POST",
body:JSON.stringify(data)
})
.then(res=>res.text())
.then(res=>{
alert("Data berhasil dikirim");
document.getElementById("formGudang").reset();
})

});

</script>

</body>
</html>

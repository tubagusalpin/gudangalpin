<!DOCTYPE html>
<html>
<head>
<title>Form Pengambilan Barang Gudang</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:420px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.15);
}

h2{
text-align:center;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
}

button{
background:#007bff;
color:white;
padding:12px;
border:none;
width:100%;
font-size:16px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#0056b3;
}

#status{
text-align:center;
margin-top:15px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Form Pengambilan Barang</h2>

<input type="text" id="nama" placeholder="Nama Pengambil">

<input type="text" id="barang" placeholder="Nama Barang">

<select id="jenis">
<option>Elektronik</option>
<option>Peralatan</option>
<option>Dokumen</option>
<option>Lainnya</option>
</select>

<label>Foto Barang</label>
<input type="file" id="fotoBarang">

<label>Foto Before</label>
<input type="file" id="fotoBefore">

<label>Foto After</label>
<input type="file" id="fotoAfter">

<button onclick="kirim()">Simpan Data</button>

<p id="status"></p>

</div>


<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbzI1f2Ob793FgVpOjO0yLGD0Tc4kNqjhbLsGnjEr3BtKvMPwNeMETnCLU5IJeZi6Wrg/exec";

function convertBase64(file){

return new Promise((resolve,reject)=>{

let reader = new FileReader();

reader.readAsDataURL(file);

reader.onload = ()=> resolve(reader.result);

reader.onerror = error => reject(error);

});

}


async function kirim(){

document.getElementById("status").innerText="Uploading data...";

let nama = document.getElementById("nama").value;
let barang = document.getElementById("barang").value;
let jenis = document.getElementById("jenis").value;

let fotoBarangFile = document.getElementById("fotoBarang").files[0];
let fotoBeforeFile = document.getElementById("fotoBefore").files[0];
let fotoAfterFile = document.getElementById("fotoAfter").files[0];

let fotoBarang = await convertBase64(fotoBarangFile);
let fotoBefore = await convertBase64(fotoBeforeFile);
let fotoAfter = await convertBase64(fotoAfterFile);

let formData = new URLSearchParams();

formData.append("nama",nama);
formData.append("barang",barang);
formData.append("jenis",jenis);
formData.append("fotoBarang",fotoBarang);
formData.append("fotoBefore",fotoBefore);
formData.append("fotoAfter",fotoAfter);

fetch(scriptURL,{
method:"POST",
body:formData
})
.then(response=>{

document.getElementById("status").innerText="✅ Data berhasil disimpan";

})
.catch(error=>{

document.getElementById("status").innerText="❌ Upload gagal";

});

}

</script>

</body>
</html>

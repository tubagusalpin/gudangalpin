```html
<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Form Pengambilan Barang Gudang</title>

<style>

body{
font-family:Arial;
background:#f3f3f3;
padding:40px;
}

.container{
background:white;
padding:25px;
max-width:600px;
margin:auto;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px;
width:100%;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

</style>

</head>

<body>

<div class="container">

<h2>Form Pengambilan Barang Gudang</h2>

<form id="formGudang">

<label>Nama Petugas</label>
<input type="text" id="petugas" required>

<label>Nama Barang</label>
<input type="text" id="barang" required>

<label>Jenis Barang</label>
<input type="text" id="jenis" required>

<label>Keterangan</label>
<textarea id="keterangan"></textarea>

<button type="submit">Kirim Data</button>

</form>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbzI1f2Ob793FgVpOjO0yLGD0Tc4kNqjhbLsGnjEr3BtKvMPwNeMETnCLU5IJeZi6Wrg/exec"

document.getElementById("formGudang").addEventListener("submit",function(e){

e.preventDefault()

let data = {

petugas:document.getElementById("petugas").value,
barang:document.getElementById("barang").value,
jenis:document.getElementById("jenis").value,
keterangan:document.getElementById("keterangan").value

}

fetch(scriptURL,{
method:"POST",
body:JSON.stringify(data)
})
.then(res=>res.text())
.then(res=>{

alert("Data berhasil dikirim ke spreadsheet!")

document.getElementById("formGudang").reset()

})

})

</script>

</body>

</html>
